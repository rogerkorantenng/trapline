syntax = "proto3";

package devvit.plugin_svc.userauth;

option go_package = "github.snooguts.net/reddit/reddit-devplatform-monorepo/go-common/generated/protos/types/devvit/plugin_svc/userauth";
option java_package = "com.reddit.devvit.plugin_svc.userauth";

// Request to ensure that a refresh token exists in the shared cache for the
// given Reddit user account.
message EnsureRefreshTokenExistsRequest {
  // Reddit account id (t2_...) of the user whose refresh token should be
  // present in the shared cache.
  string user_id = 1;
}

message EnsureRefreshTokenExistsResponse {}
